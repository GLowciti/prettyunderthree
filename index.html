<!DOCTYPE html>
<html>
<head>
  <title>PrettyUnderThree</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff5f8;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    /* PAGE FADE OUT */
    body.fade-out {
      opacity: 0;
      transform: scale(0.98);
    }

    header {
      background: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    header h1 {
      color: #ff4da6;
      margin: 0;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(to right, #ff9acb, #ffcce6);
      color: white;
    }

    .hero h2 {
      font-size: 40px;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .card {
      background: white;
      width: 220px;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* CLICK RIPPLE EFFECT */
    .card::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(255,77,166,0.2);
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:active::after {
      opacity: 1;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .old-price {
      text-decoration: line-through;
      color: #999;
      font-size: 14px;
    }

    .sale {
      color: #ff1a8c;
      font-weight: bold;
      font-size: 18px;
    }

    .timer {
      color: red;
      font-size: 14px;
      margin-top: 5px;
    }

    .stock {
      color: #e6005c;
      font-size: 13px;
      margin-top: 5px;
    }

    .stars {
      color: gold;
      margin: 5px 0;
    }

    .review {
      font-size: 12px;
      color: #555;
    }

    button {
      background: #ff4da6;
      border: none;
      padding: 10px;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }

    button:hover {
      background: #e60073;
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: white;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  <h1>PrettyUnderThree 💖</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
  </nav>
</header>

<div class="hero">
  <h2>Beauty for $3 & Under</h2>
  <p>Look pretty without breaking the bank ✨</p>
</div>

<div class="products">

  <!-- LIP GLOSS -->
  <div class="card">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQSy4dlkPpe_g2plWiHiItwpZ1EUu3OTYTViQ&s">

    <h3>Lip Gloss Set</h3>

    <div class="stars">★★★★★</div>
    <div class="review">4.9 (2,184 reviews)</div>

    <p>
      <span class="old-price">$53.99</span><br>
      <span class="sale">$3.00</span>
    </p>

    <div class="timer">Sale ends in: <span id="countdown"></span></div>
    <div class="stock" id="stock">Only 12 left in stock</div>

    <button onclick="goToProduct('liploss.html')">View</button>
  </div>

</div>

<footer>
  © 2026 PrettyUnderThree 💖
</footer>

<script>
// =========================
// PAGE TRANSITION
// =========================
function goToProduct(url){
  document.body.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = url;
  }, 400);
}


// =========================
// COUNTDOWN TIMER
// =========================
let time = Math.floor(216000 + Math.random() * 86400);

function updateTimer() {
  let days = Math.floor(time / 86400);
  let hours = Math.floor((time % 86400) / 3600);
  let minutes = Math.floor((time % 3600) / 60);
  let seconds = time % 60;

  document.getElementById("countdown").innerText =
    days + "d " +
    hours + "h " +
    minutes + "m " +
    (seconds < 10 ? "0" : "") + seconds + "s";

  if (time > 0) time--;
}

setInterval(updateTimer, 1000);


// =========================
// FAKE STOCK DROPPER
// =========================
let stock = 12;

setInterval(() => {
  if (stock > 3) {
    stock--;
    document.getElementById("stock").innerText =
      "Only " + stock + " left in stock";
  }
}, 7000);
</script>

</body>
</html>
