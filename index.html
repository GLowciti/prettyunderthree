<!DOCTYPE html>
<html>
<head>
  <title>PrettyUnderThree</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff5f8;
    }

    header {
      background: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    header h1 {
      color: #ff4da6;
      margin: 0;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(to right, #ff9acb, #ffcce6);
      color: white;
    }

    .hero h2 {
      font-size: 40px;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .card {
      background: white;
      width: 220px;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .old-price {
      text-decoration: line-through;
      color: #999;
      font-size: 14px;
    }

    .sale {
      color: #ff1a8c;
      font-weight: bold;
      font-size: 18px;
    }

    .timer {
      color: red;
      font-size: 14px;
      margin-top: 5px;
    }

    .stock {
      color: #e6005c;
      font-size: 13px;
      margin-top: 5px;
    }

    .stars {
      color: gold;
      margin: 5px 0;
    }

    .review {
      font-size: 12px;
      color: #555;
    }

    button {
      background: #ff4da6;
      border: none;
      padding: 10px;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: white;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  <h1>PrettyUnderThree 💖</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
  </nav>
</header>

<div class="hero">
  <h2>Beauty for $3 & Under</h2>
  <p>Look pretty without breaking the bank ✨</p>
</div>

<div class="products">

  <!-- LIP GLOSS -->
  <div class="card">
    <a href="liploss.html">
      <img src="https://images.unsplash.com/photo-1586495777744-4413f21062fa?w=400">
    </a>

    <h3>Lip Gloss Set</h3>

    <div class="stars">★★★★★</div>
    <div class="review">4.9 (2,184 reviews)</div>

    <p>
      <span class="old-price">$53.99</span><br>
      <span class="sale">$3.00</span>
    </p>

    <div class="timer">Sale ends in: <span id="countdown"></span></div>
    <div class="stock" id="stock">Only 12 left in stock</div>

    <button onclick="window.location.href='liploss.html'">View</button>
  </div>

</div>

<footer>
  © 2026 PrettyUnderThree 💖
</footer>

<script>
// COUNTDOWN TIMER (15 minutes reset)
let time = 900;

function updateTimer() {
  let minutes = Math.floor(time / 60);
  let seconds = time % 60;
  document.getElementById("countdown").innerText =
    minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

  if (time > 0) time--;
}

setInterval(updateTimer, 1000);

// FAKE STOCK DROPPER (looks dynamic)
let stock = 12;

setInterval(() => {
  if (stock > 3) {
    stock--;
    document.getElementById("stock").innerText =
      "Only " + stock + " left in stock";
  }
}, 7000);
</script>

</body>
</html>
