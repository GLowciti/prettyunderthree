<!DOCTYPE html>
<html>
<head>
  <title>PrettyUnderThree</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#fff5f8;
  overflow-x:hidden;
}

/* SOFT BACKGROUND GLOW */
body::before{
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle,#ff4da6 0%,transparent 70%);
  top:-200px;
  left:-200px;
  opacity:0.15;
  z-index:-1;
}

body::after{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background:radial-gradient(circle,#ff99cc 0%,transparent 70%);
  bottom:-200px;
  right:-200px;
  opacity:0.15;
  z-index:-1;
}

/* ========================= */
/* PROMO BAR */
/* ========================= */
.promo{
  background:#000;
  color:#fff;
  text-align:center;
  padding:8px;
  font-size:14px;
}

/* ========================= */
/* HEADER */
/* ========================= */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:#fff;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.logo{
  color:#ff4da6;
  font-size:22px;
  font-weight:900;
}

nav a{
  margin:0 12px;
  text-decoration:none;
  color:#333;
  font-weight:600;
}

/* ========================= */
/* HERO */
/* ========================= */
.hero{
  text-align:center;
  padding:90px 20px;
  color:#fff;
  background:linear-gradient(135deg,#ff4da6,#ff99cc);
  position:relative;
  overflow:hidden;
}

/* FLOATING BUBBLES */
.bubble{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  animation:float 8s infinite ease-in-out;
}

.bubble:nth-child(1){width:60px;height:60px;top:20%;left:10%;}
.bubble:nth-child(2){width:40px;height:40px;top:60%;left:80%;}
.bubble:nth-child(3){width:80px;height:80px;top:30%;left:70%;}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-20px)}
  100%{transform:translateY(0)}
}

.hero h2{
  font-size:48px;
  margin:0;
}

.hero p{
  margin-top:10px;
  font-size:18px;
}

.hero button{
  margin-top:25px;
  padding:15px 30px;
  border:none;
  border-radius:30px;
  background:#fff;
  color:#ff4da6;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

.hero button:hover{
  transform:scale(1.08);
}

/* ========================= */
/* TRUST BAR */
/* ========================= */
.trust{
  display:flex;
  justify-content:center;
  gap:40px;
  padding:20px;
  background:#fff;
  font-size:14px;
  flex-wrap:wrap;
}

/* ========================= */
/* PRODUCTS */
/* ========================= */
.products{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:40px 20px;
}

.card{
  width:230px;
  background:#fff;
  border-radius:15px;
  padding:15px;
  text-align:center;
  box-shadow:0 6px 18px rgba(0,0,0,.1);
  transition:.25s;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 12px 28px rgba(0,0,0,.2);
}

/* SHINE EFFECT */
.card::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
  top:0;
  left:-100%;
}

.card:hover::before{
  left:100%;
  transition:0.6s;
}

/* BADGE */
.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:#ff1a8c;
  color:#fff;
  padding:5px 8px;
  font-size:12px;
  border-radius:6px;
}

/* IMAGE */
.card img{
  width:100%;
  border-radius:10px;
}

/* TEXT */
.old-price{color:#999;text-decoration:line-through;font-size:14px;}
.sale{color:#ff1a8c;font-weight:bold;font-size:18px;}
.stars{color:gold;}
.review{font-size:12px;color:#555;}

/* BUTTON */
.card button{
  background:#ff4da6;
  border:none;
  padding:10px;
  color:#fff;
  border-radius:6px;
  margin-top:10px;
  cursor:pointer;
}

.card button:hover{
  background:#e60073;
}

/* ========================= */
/* SOCIAL PROOF POPUP */
/* ========================= */
.popup{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#fff;
  padding:12px 16px;
  border-radius:10px;
  box-shadow:0 6px 20px rgba(0,0,0,.2);
  display:none;
  font-size:14px;
}

/* ========================= */
/* FOOTER */
/* ========================= */
footer{
  text-align:center;
  padding:20px;
  background:#fff;
}
  </style>
</head>

<body>

<div class="promo">
  💖 Flash Sale — Luxuriously Cheap | Free Shipping Today
</div>

<header class="header">
  <div class="logo">PrettyUnderThree 💖</div>
  <nav>
    <a href="#">Shop</a>
    <a href="#">Best Sellers</a>
    <a href="#">New</a>
  </nav>
</header>

<div class="hero">
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <h2>Glow Like Luxury</h2>
  <p>Beauty4Less </p>
  <button onclick="scrollToProducts()">Shop Now</button>
</div>

<div class="trust">
  <div>🚚 Free Shipping</div>
  <div>💖 2,000+ Customers</div>
  <div>🔒 Secure Checkout</div>
  <div>💯 30-Day Guarantee</div>
</div>

<div class="products">

  <div class="card">
    <div class="badge">BEST SELLER</div>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQSy4dlkPpe_g2plWiHiItwpZ1EUu3OTYTViQ&s">

    <h3>Lip Gloss Set</h3>

    <div class="stars">★★★★★</div>
    <div class="review">4.9 (2,184 reviews)</div>

    <p>
      <span class="old-price">$53.99</span><br>
      <span class="sale">$3.00</span>
    </p>

    <button onclick="goToProduct('liploss.html')">View</button>
  </div>

</div>

<div id="popup" class="popup"></div>

<footer>
  © 2026 PrettyUnderThree 💖
</footer>


<script>
// =========================
// WAIT FOR PAGE LOAD (IMPORTANT)
// =========================
document.addEventListener("DOMContentLoaded", () => {

  // =========================
  // SMOOTH SCROLL (HERO BUTTON)
  // =========================
  window.scrollToProducts = function(){
    const section = document.querySelector(".products");
    if(section){
      section.scrollIntoView({ behavior: "smooth" });
    }
  };

  // =========================
  // PAGE TRANSITION (VIEW BUTTON)
  // =========================
  window.goToProduct = function(url){
    document.body.style.transition = "opacity 0.4s ease, transform 0.4s ease";
    document.body.style.opacity = "0";
    document.body.style.transform = "scale(0.98)";

    setTimeout(() => {
      window.location.href = url;
    }, 400);
  };

  // =========================
  // COUNTDOWN TIMER
  // =========================
  const countdownEl = document.getElementById("countdown");

  if(countdownEl){
    let time = Math.floor(216000 + Math.random() * 86400); // ~2.5–3.5 days

    function updateTimer(){
      let days = Math.floor(time / 86400);
      let hours = Math.floor((time % 86400) / 3600);
      let minutes = Math.floor((time % 3600) / 60);
      let seconds = time % 60;

      countdownEl.innerText =
        days + "d " +
        hours + "h " +
        minutes + "m " +
        (seconds < 10 ? "0" : "") + seconds + "s";

      if(time > 0) time--;
    }

    updateTimer();
    setInterval(updateTimer, 1000);
  }

  // =========================
  // FAKE STOCK DROPPER
  // =========================
  const stockEl = document.getElementById("stock");

  if(stockEl){
    let stock = 12;

    setInterval(() => {
      if(stock > 3){
        stock--;
        stockEl.innerText = "Only " + stock + " left in stock";
      }
    }, 7000);
  }

  // =========================
  // LIVE SALES POPUP
  // =========================
  const popup = document.getElementById("popup");

  if(popup){
    const names = [
      "Mia","Jasmine","Aaliyah","Sofia","Emma","Zoe",
      "Olivia","Ava","Isabella","Chloe"
    ];

    function showPopup(){
      const name = names[Math.floor(Math.random() * names.length)];
      const minutes = Math.floor(Math.random() * 10) + 1;

      popup.innerText = `${name} just bought Lip Gloss (${minutes} min ago)`;
      popup.style.display = "block";

      // animate in
      popup.style.opacity = "0";
      popup.style.transform = "translateY(20px)";
      popup.style.transition = "all 0.3s ease";

      setTimeout(() => {
        popup.style.opacity = "1";
        popup.style.transform = "translateY(0)";
      }, 50);

      // hide after 4s
      setTimeout(() => {
        popup.style.opacity = "0";
        popup.style.transform = "translateY(20px)";
        setTimeout(() => {
          popup.style.display = "none";
        }, 300);
      }, 4000);
    }

    setInterval(showPopup, 8000);
  }

});
</script>

</body>
</html>
