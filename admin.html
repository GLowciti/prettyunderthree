<script>
const allData = JSON.parse(localStorage.getItem("animalDataList")) || [];

const output = document.getElementById("output");

if (allData.length === 0) {
  output.innerText = "No data found.";
} else {
  let html = "";

  allData.forEach((entry, index) => {
    html += `<h3>Entry ${index + 1}</h3>`;
    
    for (let key in entry) {
      html += `<div><strong>${key}:</strong> ${entry[key]}</div>`;
    }

    html += "<hr>";
  });

  output.innerHTML = html;
}
</script>
