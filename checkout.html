<!DOCTYPE html>
<html>
<head>
  <title>Secure Checkout | PrettyUnderThree</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f6f6f6;
      margin: 0;
    }

    header {
      background: black;
      color: gold;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .left, .right {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .left { flex: 2; }
    .right { flex: 1; }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: #ffa41c;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .secondary { background: #ddd; }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .total {
      font-weight: bold;
      font-size: 20px;
      color: #b12704;
    }

    .step { display: none; }
    .active { display: block; }

    .secure {
      color: green;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .steps {
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .box {
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<header>🔒 Secure Checkout</header>
<div class="steps">Step 1: Shipping ➡ Step 2: Payment</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <!-- STEP 1 -->
    <div id="step1" class="step active">

      <h3>Contact Information</h3>
      <input type="email" id="email" placeholder="Email Address">

      <h3>Shipping Address</h3>
      <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="address" placeholder="Address">
      <input type="text" id="city" placeholder="City">
      <input type="text" id="state" placeholder="State (CA)">
      <input type="text" id="zip" placeholder="ZIP Code">

      <button onclick="goToPayment()">Continue to Payment</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step">

      <h3>Payment Method</h3>
      <div class="secure">🔒 Secure payment</div>

      <!-- CARD -->
      <div class="box">
        <h4>Card Information</h4>

        <input type="text" id="card" placeholder="Card Number" oninput="detectCard()">
        <div id="cardType" style="font-size:14px;"></div>

        <div style="display:flex; gap:10px;">
          <input type="text" id="exp" placeholder="MM/YY">
          <input type="text" id="cvv" placeholder="CVV">
        </div>

        <input type="text" id="cardname" placeholder="Name on Card">
      </div>

      <!-- BILLING (ALWAYS VISIBLE) -->
      <div class="box">
        <h4>Billing Address (Required)</h4>

        <input type="text" id="bname" placeholder="Full Name">
        <input type="text" id="baddress" placeholder="Billing Address">
        <input type="text" id="bcity" placeholder="City">

        <div style="display:flex; gap:10px;">
          <input type="text" id="bstate" placeholder="State (CA)">
          <input type="text" id="bzip" placeholder="ZIP Code">
        </div>
      </div>

      <button onclick="placeOrder()">Place Order</button>
      <button class="secondary" onclick="backToShipping()">Back</button>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">
    <h3>Order Summary</h3>

    <div class="row"><span>Items:</span><span>$3.00</span></div>
    <div class="row"><span>Shipping:</span><span style="color:green;">FREE</span></div>
    <div class="row"><span>Tax:</span><span>$1.00</span></div>

    <hr>

    <div class="row total"><span>Total:</span><span>$4.00</span></div>
  </div>

</div>

<script>
// VALIDATION
function isValidEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
function isValidZip(z){return /^\d{5}$/.test(z);}
function isValidState(s){return /^[A-Za-z]{2}$/.test(s);}
function isValidCVV(c){return /^\d{3,4}$/.test(c);}
function isValidExp(e){return /^(0[1-9]|1[0-2])\/\d{2}$/.test(e);}

// LUHN CHECK
function luhnCheck(card){
  let sum=0,flip=false;
  card=card.replace(/\D/g,'');
  for(let i=card.length-1;i>=0;i--){
    let n=parseInt(card[i]);
    if(flip){n*=2;if(n>9)n-=9;}
    sum+=n;flip=!flip;
  }
  return sum%10===0;
}

// CARD TYPE
function getCardType(n){
  n=n.replace(/\D/g,'');
  if(/^4/.test(n)) return "Visa";
  if(/^5[1-5]/.test(n)) return "Mastercard";
  if(/^3[47]/.test(n)) return "Amex";
  if(/^6/.test(n)) return "Discover";
  return "Unknown";
}

function detectCard(){
  cardType.innerHTML = cardEl.value ? "Card: "+getCardType(cardEl.value) : "";
}

// AUTO-FILL BILLING
function autoFillBilling(){
  bnameEl.value=nameEl.value;
  baddressEl.value=addressEl.value;
  bcityEl.value=cityEl.value;
  bstateEl.value=stateEl.value;
  bzipEl.value=zipEl.value;
}

// NAVIGATION
function goToPayment(){
  if(!isValidEmail(emailEl.value)){alert("Invalid email");return;}

  autoFillBilling();

  step1.classList.remove("active");
  step2.classList.add("active");
}

function backToShipping(){
  step2.classList.remove("active");
  step1.classList.add("active");
}

// PLACE ORDER
function placeOrder(){
  if(!luhnCheck(cardEl.value)){alert("Invalid card");return;}
  if(!isValidExp(expEl.value)){alert("Invalid expiration");return;}
  if(!isValidCVV(cvvEl.value)){alert("Invalid CVV");return;}

  // BILLING REQUIRED
  if(!bnameEl.value||!baddressEl.value||!bcityEl.value||!bstateEl.value||!bzipEl.value){
    alert("Billing address is required");return;
  }

  if(!isValidState(bstateEl.value)){alert("State must be 2 letters");return;}
  if(!isValidZip(bzipEl.value)){alert("Invalid ZIP");return;}

  const order={
    id:"PUT"+Math.floor(Math.random()*1000000),
    name:nameEl.value,
    email:emailEl.value,
    total:"$4.00",
    date:new Date().toLocaleDateString(),
    time:new Date().toLocaleTimeString()
  };

  localStorage.setItem("orderData",JSON.stringify(order));
  window.location.href="confirmation.html";
}

// ELEMENTS
const emailEl=document.getElementById("email");
const nameEl=document.getElementById("name");
const addressEl=document.getElementById("address");
const cityEl=document.getElementById("city");
const stateEl=document.getElementById("state");
const zipEl=document.getElementById("zip");

const cardEl=document.getElementById("card");
const expEl=document.getElementById("exp");
const cvvEl=document.getElementById("cvv");

const bnameEl=document.getElementById("bname");
const baddressEl=document.getElementById("baddress");
const bcityEl=document.getElementById("bcity");
const bstateEl=document.getElementById("bstate");
const bzipEl=document.getElementById("bzip");

const step1=document.getElementById("step1");
const step2=document.getElementById("step2");

const cardType=document.getElementById("cardType");
</script>

</body>
</html>
