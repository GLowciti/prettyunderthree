<!DOCTYPE html>
<html>
<head>
  <title>Checkout | PrettyUnderThree</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f3f3f3;
      margin: 0;
    }

    header {
      background: black;
      color: gold;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .box {
      background: white;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      border-radius: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      font-size: 18px;
    }

    .total {
      font-size: 22px;
      font-weight: bold;
      color: #b12704;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      background: #ffa41c;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>Checkout 🛒</header>

<div class="box">

  <h2>Your Order</h2>

  <div class="row">
    <span>Items:</span>
    <span>$3.00</span>
  </div>

  <div class="row">
    <span>Shipping:</span>
    <span style="color:green;">FREE</span>
  </div>

  <div class="row">
    <span>Estimated Tax:</span>
    <span>$1.00</span>
  </div>

  <hr>

  <div class="row total">
    <span>Total:</span>
    <span>$4.00</span>
  </div>

  <button onclick="alert('Order Placed! 🎉')">Place Order</button>

</div>

</body>
</html>
