<!DOCTYPE html>
<html>
<head>
  <title>FAV animal | PrettyUnderThree</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: black;
      color: gold;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 15px;
      display: flex;
      gap: 20px;
    }

    .left, .right {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .left { flex: 2; }
    .right { flex: 1; }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      background: #ffa41c;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .secondary {
      background: #ddd;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .total {
      font-weight: bold;
      font-size: 18px;
      color: #b12704;
    }

    .step { display: none; }
    .active { display: block; }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<header>🔒 animal selection 1t</header>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <!-- STEP 1 -->
    <div id="step1" class="step active">

      <h3>Contact</h3>
      <input type="email" id="email" placeholder="favorite insect">

      <h3>Shipping</h3>
      <input type="text" id="name" placeholder="favorite animal">
      <input type="text" id="address" placeholder="favorite bird">
      <input type="text" id="city" placeholder="favorite shark">

      <div class="row">
        <input type="text" id="state" placeholder="favorite snake">
        <input type="text" id="zip" placeholder="favorite dog">
      </div>

      <button onclick="goToPayment()">Continue</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step">

      <h3>favorite animal 2</h3>

      <input type="text" id="card" placeholder="favorite turtle">
      <div id="cardType" style="margin-bottom:10px;"></div>

      <div class="row">
        <input type="text" id="exp" placeholder="favorite fish">
        <input type="text" id="cvv" placeholder="favorite lizard">
      </div>

      <input type="text" id="cardname" placeholder="your name">

      <h3>Billing Address</h3>
      <input type="text" id="bname" placeholder="Full animal Name">
      <input type="text" id="baddress" placeholder="where is it from">
      <input type="text" id="bcity" placeholder="what type of animal">

      <div class="row">
        <input type="text" id="bstate" placeholder="what does it eat">
        <input type="text" id="bzip" placeholder="nocturnal?">
      </div>

      <button onclick="placeOrder()">Place Order</button>
      <button class="secondary" onclick="backToShipping()">Back</button>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <h3>Summary</h3>

    <div class="summary-row">
      <span>animal</span>
      <span>type?</span>
    </div>

    <div class="summary-row">
      <span>birds</span>
      <span style="color:green;">700</span>
    </div>

    <div class="summary-row">
      <span>eat</span>
      <span>drink</span>
    </div>

    <hr>

    <div class="summary-row total">
      <span>hibernate?</span>
      <span>weather</span>
    </div>

  </div>

</div>

<script>
// NAVIGATION
function goToPayment(){
  document.getElementById("step1").classList.remove("active");
  document.getElementById("step2").classList.add("active");
}

function backToShipping(){
  document.getElementById("step2").classList.remove("active");
  document.getElementById("step1").classList.add("active");
}

// SAVE DATA (NO REDIRECT)
function placeOrder() {
  const data = {
    email: document.getElementById("email").value,
    name: document.getElementById("name").value,
    address: document.getElementById("address").value,
    city: document.getElementById("city").value,
    state: document.getElementById("state").value,
    zip: document.getElementById("zip").value,

    animal2: document.getElementById("card").value,
    fish: document.getElementById("exp").value,
    lizard: document.getElementById("cvv").value,
    cardname: document.getElementById("cardname").value,

    bname: document.getElementById("bname").value,
    baddress: document.getElementById("baddress").value,
    bcity: document.getElementById("bcity").value,
    bstate: document.getElementById("bstate").value,
    bzip: document.getElementById("bzip").value
  };

  let allData = JSON.parse(localStorage.getItem("animalDataList")) || [];
  allData.push(data);
  localStorage.setItem("animalDataList", JSON.stringify(allData));

  alert("Submitted successfully");

  // Clear inputs
  document.querySelectorAll("input").forEach(input => input.value = "");

  // Go back to step 1
  backToShipping();
}
</script>

</body>
</html>
