<!DOCTYPE html>
<html>
<head>
  <title>Secure Checkout | PrettyUnderThree</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f6f6f6;
      margin: 0;
    }

    header {
      background: black;
      color: gold;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .left, .right {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .left { flex: 2; }
    .right { flex: 1; }

    h3 { margin-top: 0; }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: #ffa41c;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .secondary {
      background: #ddd;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .total {
      font-weight: bold;
      font-size: 20px;
      color: #b12704;
    }

    .step {
      display: none;
    }

    .active {
      display: block;
    }

    .secure {
      color: green;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .steps {
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>🔒 Secure Checkout</header>

<div class="steps">Step 1: Shipping ➡ Step 2: Payment</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <!-- STEP 1 -->
    <div id="step1" class="step active">

      <h3>Contact Information</h3>
      <input type="email" id="email" placeholder="Email Address">

      <h3>Shipping Address</h3>
      <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="address" placeholder="Address">
      <input type="text" id="city" placeholder="City">
      <input type="text" id="state" placeholder="State (ex: CA)">
      <input type="text" id="zip" placeholder="ZIP Code">

      <button onclick="goToPayment()">Continue to Payment</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step">

      <h3>Payment Details</h3>
      <div class="secure">🔒 Secure payment</div>

      <input type="text" id="card" placeholder="Card Number">
      <input type="text" id="exp" placeholder="MM/YY">
      <input type="text" id="cvv" placeholder="CVV">
      <input type="text" id="cardname" placeholder="Name on Card">

      <button onclick="placeOrder()">Place Order</button>
      <button class="secondary" onclick="backToShipping()">Back</button>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <h3>Order Summary</h3>

    <div class="row">
      <span>Items:</span>
      <span>$3.00</span>
    </div>

    <div class="row">
      <span>Shipping:</span>
      <span style="color:green;">FREE</span>
    </div>

    <div class="row">
      <span>Estimated Tax:</span>
      <span>$1.00</span>
    </div>

    <hr>

    <div class="row total">
      <span>Total:</span>
      <span>$4.00</span>
    </div>

  </div>

</div>

<script>
// VALIDATION FUNCTIONS
function isValidZip(zip) {
  return /^\d{5}(-\d{4})?$/.test(zip);
}

function isValidState(state) {
  return /^[A-Za-z]{2}$/.test(state);
}

function isValidAddress(address) {
  return address.length > 5;
}

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// STEP CHANGE
function goToPayment() {
  const email = document.getElementById("email").value.trim();
  const name = document.getElementById("name").value.trim();
  const address = document.getElementById("address").value.trim();
  const city = document.getElementById("city").value.trim();
  const state = document.getElementById("state").value.trim();
  const zip = document.getElementById("zip").value.trim();

  if (!email || !name || !address || !city || !state || !zip) {
    alert("Please fill in all shipping fields.");
    return;
  }

  if (!isValidEmail(email)) {
    alert("Please enter a valid email address (example: name@email.com).");
    return;
  }

  if (!isValidAddress(address)) {
    alert("Please enter a valid street address.");
    return;
  }

  if (!isValidState(state)) {
    alert("Use 2-letter state code (example: CA).");
    return;
  }

  if (!isValidZip(zip)) {
    alert("Enter a valid ZIP code (example: 90001).");
    return;
  }

  document.getElementById("step1").classList.remove("active");
  document.getElementById("step2").classList.add("active");
}

function backToShipping() {
  document.getElementById("step2").classList.remove("active");
  document.getElementById("step1").classList.add("active");
}

// FINAL ORDER
function placeOrder() {
  const card = document.getElementById("card").value.trim();
  const exp = document.getElementById("exp").value.trim();
  const cvv = document.getElementById("cvv").value.trim();

  if (!card || !exp || !cvv) {
    alert("Please enter payment info.");
    return;
  }

  alert("Order placed successfully! 🎉 Confirmation sent to your email.");
}
</script>

</body>
</html>
