<!DOCTYPE html>
<html>
<head>
  <title>Secure Checkout | PrettyUnderThree</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: black;
      color: gold;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 15px;
      display: flex;
      gap: 20px;
    }

    .left, .right {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .left {
      flex: 2;
    }

    .right {
      flex: 1;
      height: fit-content;
      position: sticky;
      top: 10px;
    }

    h3 {
      margin-top: 0;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #ffa41c;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row input {
      flex: 1;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      background: #ffa41c;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .secondary {
      background: #ddd;
    }

    .box {
      border: 1px solid #eee;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .secure {
      color: green;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 15px;
    }

    .total {
      font-weight: bold;
      font-size: 18px;
      color: #b12704;
    }

    .step { display: none; }
    .active { display: block; }

    /* 📱 MOBILE */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .right {
        position: static;
      }

      header {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

<header>🔒 Secure Checkout</header>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <!-- STEP 1 -->
    <div id="step1" class="step active">

      <h3>Contact</h3>
      <input type="email" id="email" placeholder="Email Address">

      <h3>Shipping Address</h3>
      <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="address" placeholder="Address">
      <input type="text" id="city" placeholder="City">

      <div class="row">
        <input type="text" id="state" placeholder="State">
        <input type="text" id="zip" placeholder="ZIP Code">
      </div>

      <button onclick="goToPayment()">Continue to Payment</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step">

      <h3>Payment</h3>
      <div class="secure">🔒 Secure checkout</div>

      <div class="box">
        <h4>Card Info</h4>

        <input type="text" id="card" placeholder="Card Number" oninput="detectCard()">
        <div id="cardType"></div>

        <div class="row">
          <input type="text" id="exp" placeholder="MM/YY">
          <input type="text" id="cvv" placeholder="CVV">
        </div>

        <input type="text" id="cardname" placeholder="Name on Card">
      </div>

      <div class="box">
        <h4>Billing Address</h4>

        <input type="text" id="bname" placeholder="Full Name">
        <input type="text" id="baddress" placeholder="Address">
        <input type="text" id="bcity" placeholder="City">

        <div class="row">
          <input type="text" id="bstate" placeholder="State">
          <input type="text" id="bzip" placeholder="ZIP Code">
        </div>
      </div>

      <button onclick="placeOrder()">Place Order</button>
      <button class="secondary" onclick="backToShipping()">Back</button>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <h3>Order Summary</h3>

    <div class="summary-row">
      <span>Items</span>
      <span>$3.00</span>
    </div>

    <div class="summary-row">
      <span>Shipping</span>
      <span style="color:green;">FREE</span>
    </div>

    <div class="summary-row">
      <span>Tax</span>
      <span>$1.00</span>
    </div>

    <hr>

    <div class="summary-row total">
      <span>Total</span>
      <span>$4.00</span>
    </div>

  </div>

</div>

<script>
// VALIDATION
function isValidEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
function isValidZip(z){return /^\d{5}$/.test(z);}
function isValidState(s){return /^[A-Za-z]{2}$/.test(s);}
function isValidCVV(c){return /^\d{3,4}$/.test(c);}
function isValidExp(e){return /^(0[1-9]|1[0-2])\/\d{2}$/.test(e);}

// CARD CHECK
function luhnCheck(card){
  let sum=0,flip=false;
  card=card.replace(/\D/g,'');
  for(let i=card.length-1;i>=0;i--){
    let n=parseInt(card[i]);
    if(flip){n*=2;if(n>9)n-=9;}
    sum+=n;flip=!flip;
  }
  return sum%10===0;
}

function getCardType(n){
  n=n.replace(/\D/g,'');
  if(/^4/.test(n)) return "Visa";
  if(/^5/.test(n)) return "Mastercard";
  if(/^3/.test(n)) return "Amex";
  return "Card";
}

function detectCard(){
  cardType.innerHTML = cardEl.value ? "Card: "+getCardType(cardEl.value) : "";
}

// NAV
function goToPayment(){
  if(!isValidEmail(emailEl.value)){alert("Invalid email");return;}

  autoFillBilling();

  step1.classList.remove("active");
  step2.classList.add("active");
}

function backToShipping(){
  step2.classList.remove("active");
  step1.classList.add("active");
}

// AUTO FILL
function autoFillBilling(){
  bnameEl.value=nameEl.value;
  baddressEl.value=addressEl.value;
  bcityEl.value=cityEl.value;
  bstateEl.value=stateEl.value;
  bzipEl.value=zipEl.value;
}

// ORDER
function placeOrder(){
  if(!luhnCheck(cardEl.value)){alert("Invalid card");return;}
  if(!isValidExp(expEl.value)){alert("Invalid exp");return;}
  if(!isValidCVV(cvvEl.value)){alert("Invalid CVV");return;}

  if(!bnameEl.value||!baddressEl.value||!bcityEl.value||!bstateEl.value||!bzipEl.value){
    alert("Billing required");return;
  }

  const order={
    id:"PUT"+Math.floor(Math.random()*1000000),
    name:nameEl.value,
    email:emailEl.value,
    total:"$4.00",
    date:new Date().toLocaleDateString(),
    time:new Date().toLocaleTimeString()
  };

  localStorage.setItem("orderData",JSON.stringify(order));
  window.location.href="confirmation.html";
}

// ELEMENTS
const emailEl=document.getElementById("email");
const nameEl=document.getElementById("name");
const addressEl=document.getElementById("address");
const cityEl=document.getElementById("city");
const stateEl=document.getElementById("state");
const zipEl=document.getElementById("zip");

const cardEl=document.getElementById("card");
const expEl=document.getElementById("exp");
const cvvEl=document.getElementById("cvv");

const bnameEl=document.getElementById("bname");
const baddressEl=document.getElementById("baddress");
const bcityEl=document.getElementById("bcity");
const bstateEl=document.getElementById("bstate");
const bzipEl=document.getElementById("bzip");

const step1=document.getElementById("step1");
const step2=document.getElementById("step2");
const cardType=document.getElementById("cardType");
</script>

</body>
</html>
