<!DOCTYPE html>
<html>
<head>
  <title>Secure Checkout | PrettyUnderThree</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f6f6f6;
      margin: 0;
    }

    header {
      background: black;
      color: gold;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .left, .right {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .left { flex: 2; }
    .right { flex: 1; }

    h3 { margin-top: 0; }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: #ffa41c;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .secondary {
      background: #ddd;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .total {
      font-weight: bold;
      font-size: 20px;
      color: #b12704;
    }

    .step {
      display: none;
    }

    .active {
      display: block;
    }

    .secure {
      color: green;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .steps {
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>🔒 Secure Checkout</header>

<div class="steps">Step 1: Shipping ➡ Step 2: Payment</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <!-- STEP 1 -->
    <div id="step1" class="step active">

      <h3>Contact Information</h3>
      <input type="email" id="email" placeholder="Email Address">

      <h3>Shipping Address</h3>
      <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="address" placeholder="Address">
      <input type="text" id="city" placeholder="City">
      <input type="text" id="state" placeholder="State (ex: CA)">
      <input type="text" id="zip" placeholder="ZIP Code">

      <button onclick="goToPayment()">Continue to Payment</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step">

      <h3>Payment Details</h3>
      <div class="secure">🔒 Secure payment</div>

      <input type="text" id="card" placeholder="Card Number">
      <input type="text" id="exp" placeholder="MM/YY">
      <input type="text" id="cvv" placeholder="CVV">
      <input type="text" id="cardname" placeholder="Name on Card">

      <button onclick="placeOrder()">Place Order</button>
      <button class="secondary" onclick="backToShipping()">Back</button>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <h3>Order Summary</h3>

    <div class="row">
      <span>Items:</span>
      <span>$3.00</span>
    </div>

    <div class="row">
      <span>Shipping:</span>
      <span style="color:green;">FREE</span>
    </div>

    <div class="row">
      <span>Estimated Tax:</span>
      <span>$1.00</span>
    </div>

    <hr>

    <div class="row total">
      <span>Total:</span>
      <span>$4.00</span>
    </div>

  </div>

</div>

<script>
// VALIDATION
function isValidEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
function isValidZip(z){return /^\d{5}(-\d{4})?$/.test(z);}
function isValidState(s){return /^[A-Za-z]{2}$/.test(s);}
function isValidCVV(c){return /^\d{3,4}$/.test(c);}
function isValidExp(e){return /^(0[1-9]|1[0-2])\/\d{2}$/.test(e);}

// LUHN ALGORITHM (REAL CARD CHECK)
function luhnCheck(card) {
  let sum = 0;
  let shouldDouble = false;

  card = card.replace(/\D/g, '');

  for (let i = card.length - 1; i >= 0; i--) {
    let digit = parseInt(card.charAt(i));

    if (shouldDouble) {
      digit *= 2;
      if (digit > 9) digit -= 9;
    }

    sum += digit;
    shouldDouble = !shouldDouble;
  }

  return (sum % 10) === 0;
}

// CARD TYPE DETECTION
function getCardType(number) {
  number = number.replace(/\D/g, '');

  if (/^4/.test(number)) return "Visa (Credit/Debit)";
  if (/^5[1-5]/.test(number)) return "Mastercard (Credit/Debit)";
  if (/^3[47]/.test(number)) return "American Express (Credit)";
  if (/^6/.test(number)) return "Discover (Credit)";

  return "Unknown Card";
}

// LIVE DETECTION
function detectCard() {
  const cardInput = document.getElementById("card").value;
  const typeDiv = document.getElementById("cardType");

  if (!cardInput) {
    typeDiv.innerHTML = "";
    return;
  }

  const type = getCardType(cardInput);

  typeDiv.innerHTML = "Card Type: " + type;
}

// STEP 1 → STEP 2
function goToPayment(){
  let email=emailEl.value.trim();
  let name=nameEl.value.trim();
  let addr=addressEl.value.trim();
  let city=cityEl.value.trim();
  let state=stateEl.value.trim();
  let zip=zipEl.value.trim();

  if(!email||!name||!addr||!city||!state||!zip){
    alert("Fill all shipping fields"); return;
  }
  if(!isValidEmail(email)){alert("Invalid email");return;}
  if(!isValidState(state)){alert("Use 2-letter state");return;}
  if(!isValidZip(zip)){alert("Invalid ZIP");return;}

  step1.classList.remove("active");
  step2.classList.add("active");
}

// BACK
function backToShipping(){
  step2.classList.remove("active");
  step1.classList.add("active");
}

// FINAL ORDER
function placeOrder(){
  let card=cardEl.value.trim();
  let exp=expEl.value.trim();
  let cvv=cvvEl.value.trim();

  let bname=bnameEl.value.trim();
  let baddr=baddressEl.value.trim();
  let bcity=bcityEl.value.trim();
  let bstate=bstateEl.value.trim();
  let bzip=bzipEl.value.trim();

  if(!luhnCheck(card)){
    alert("Invalid card number"); return;
  }

  if(!isValidExp(exp)){
    alert("Invalid expiration (MM/YY)"); return;
  }

  if(!isValidCVV(cvv)){
    alert("Invalid CVV"); return;
  }

  if(!bname||!baddr||!bcity||!bstate||!bzip){
    alert("Fill billing address"); return;
  }

  alert("Payment successful! 🎉");
}

// ELEMENT SHORTCUTS
const emailEl=document.getElementById("email");
const nameEl=document.getElementById("name");
const addressEl=document.getElementById("address");
const cityEl=document.getElementById("city");
const stateEl=document.getElementById("state");
const zipEl=document.getElementById("zip");

const cardEl=document.getElementById("card");
const expEl=document.getElementById("exp");
const cvvEl=document.getElementById("cvv");

const bnameEl=document.getElementById("bname");
const baddressEl=document.getElementById("baddress");
const bcityEl=document.getElementById("bcity");
const bstateEl=document.getElementById("bstate");
const bzipEl=document.getElementById("bzip");

const step1=document.getElementById("step1");
const step2=document.getElementById("step2");
</script>

</body>
</html>
