<!DOCTYPE html>
<html>
<head>
  <title>Order Confirmation | PrettyUnderThree</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eaeded;
      margin: 0;
    }

    header {
      background: #131921;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(10px);}
      to {opacity:1; transform: translateY(0);}
    }

    .success {
      color: #067d62;
      font-size: 22px;
      font-weight: bold;
    }

    .section {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      flex-wrap: wrap;
    }

    .product {
      display: flex;
      gap: 15px;
      margin-top: 10px;
      align-items: center;
    }

    .product img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
    }

    .price {
      color: #b12704;
      font-weight: bold;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: #ffd814;
      border: 1px solid #fcd200;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    .progress-bar {
      height: 6px;
      background: #ddd;
      border-radius: 5px;
      overflow: hidden;
      margin: 10px 0;
    }

    .progress-fill {
      height: 100%;
      width: 13%;
      background: #067d62;
      animation: loadBar 2s ease;
    }

    @keyframes loadBar {
      from {width: 0;}
      to {width: 13%;}
    }

    .steps {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }

    .step.active {
      color: #067d62;
      font-weight: bold;
    }

    .address-box {
      background: #f7fafa;
      padding: 12px;
      border-radius: 6px;
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      .product {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>

<header>PrettyUnderThree</header>

<div class="container">

  <div class="success">✅ Order placed successfully!</div>
  <p>Estimated delivery: <strong id="delivery"></strong></p>

  <!-- PROGRESS -->
  <div class="section">
    <h3>Delivery Progress</h3>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>

    <div class="steps">
      <div class="step active">Ordered</div>
      <div class="step active">Shipped</div>
      <div class="step active">Out for Delivery</div>
      <div class="step">Delivered</div>
    </div>
  </div>

  <!-- ORDER INFO -->
  <div class="section">
    <h3>Order Info</h3>
    <div class="row"><span>Order #</span><span id="orderNumber"></span></div>
    <div class="row"><span>Date</span><span id="date"></span></div>
    <div class="row"><span>Time</span><span id="time"></span></div>
  </div>

  <!-- SHIPPING ADDRESS -->
  <div class="section">
    <h3>Shipping Address</h3>

    <div class="address-box">
      <div id="name"></div>
      <div id="address"></div>
      <div id="cityStateZip"></div>
      <div id="email"></div>
    </div>
  </div>

  <!-- ITEMS -->
  <div class="section">
    <h3>Items</h3>
    <div id="items"></div>
  </div>

  <!-- PAYMENT -->
  <div class="section">
    <h3>Payment</h3>
    <p>Card ending in **** <span id="cardLast4"></span></p>
  </div>

  <!-- TOTAL -->
  <div class="section">
    <h3>Order Summary</h3>

    <div class="row"><span>Items</span><span>$3.00</span></div>
    <div class="row"><span>Shipping</span><span style="color:green;">FREE</span></div>
    <div class="row"><span>Tax</span><span>$1.00</span></div>

    <hr>

    <div class="row" style="font-weight:bold;">
      <span>Total</span>
      <span id="total"></span>
    </div>
  </div>

  <button onclick="home()">Continue Shopping</button>

</div>

<script>
const data = JSON.parse(localStorage.getItem("orderData"));

if (data) {
  // Order info
  orderNumber.innerText = data.orderNumber;
  date.innerText = data.date;
  time.innerText = data.time;

  // ✅ Calculate delivery date (order date + 3 days)
  let orderDate = new Date(data.date);

  // Fallback if parsing fails
  if (isNaN(orderDate)) {
    orderDate = new Date();
  }

  orderDate.setDate(orderDate.getDate() + 3);

  let options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  let deliveryDate = orderDate.toLocaleDateString(undefined, options);

  delivery.innerText = deliveryDate;

  // Address info
  name.innerText = data.name;
  address.innerText = data.address;
  cityStateZip.innerText = data.city + ", " + data.state + " " + data.zip;
  email.innerText = data.email;

  // Payment + total
  cardLast4.innerText = data.cardLast4;
  total.innerText = data.total;

  // Items
  let html = "";

  data.items.forEach(item => {
    html += `
      <div class="product">
        <img src="${item.img}">
        <div>
          <div><strong>${item.name}</strong></div>
          <div class="price">${item.price}</div>
        </div>
      </div>
    `;
  });

  items.innerHTML = html;
}

function home() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
